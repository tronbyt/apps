name: Airplanes Live Overhead
summary: Closest aircraft overhead
desc: >-
  Shows the single closest aircraft to your location using an airplanes.live
  ADS-B feed (no API key): callsign, type, altitude, distance, bearing, speed,
  and a plane icon rotated to its heading. Surfaces emergency squawks
  (7500/7600/7700) first. Renders at 64x32 and 128x64. Data from
  airplanes.live; for personal, non-commercial use.
