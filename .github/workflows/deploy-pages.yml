name: Build and Deploy App Viewer to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'

      - name: Install dependencies
        run: |
          cd app-viewer
          npm install

      - name: Build site into staging directory
        run: |
          mkdir -p _site

          # Copy app-viewer static assets to site root
          cp app-viewer/index.html _site/
          cp app-viewer/app.html _site/
          cp app-viewer/main.js _site/
          cp app-viewer/style.css _site/
          cp app-viewer/dots.svg _site/
          cp app-viewer/dots@2x.svg _site/

          # Generate apps.json directly into the site root
          node app-viewer/generate-apps-json.js --output _site/apps.json

          # Copy the apps directory (images and other assets referenced by the viewer)
          cp -r apps _site/apps

          # Copy broken_apps.txt if present
          [ -f broken_apps.txt ] && cp broken_apps.txt _site/ || true

          # Disable Jekyll
          touch _site/.nojekyll

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages
          force_orphan: true
