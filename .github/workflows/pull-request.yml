name: Build and Test

permissions:
  contents: write

on:
  pull_request:
    branches:
      - "**"

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          token: ${{ secrets.ACTIONS_PAT }}

      - name: Setup build agent
        run: ./.github/scripts/setup.sh

      - name: Determine targets
        id: targets
        run: ./.github/scripts/determine-targets.sh
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}

      - name: Check modified apps
        run: ./.github/scripts/check-apps.sh
        env:
          TARGETS: "${{ steps.targets.outputs.targets }}"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install PyYAML

      - name: Update manifest metadata
        if: steps.targets.outputs.targets != ''
        env:
          TARGETS: "${{ steps.targets.outputs.targets }}"
        run: |
          CLEAN=$(echo "${TARGETS}" | tr -d '"' | xargs)
          if [ -n "${CLEAN}" ]; then
            python3 .github/scripts/update_manifests.py ${CLEAN}
          fi

      - name: Commit and push manifest updates to PR branch
        if: steps.targets.outputs.targets != ''
        run: |
          if [[ -n $(git status --porcelain apps/*/manifest.yaml) ]]; then
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            git add apps/*/manifest.yaml
            git commit -m "chore: auto-update manifest metadata [skip ci]"
            git push origin HEAD:${{ github.head_ref }}
          fi
